# Conda Environment for PHISH-BOT v2.0.0
# Author: Ian Carter Kulani

name: phishbot
channels:
  - conda-forge
  - defaults
  - anaconda

dependencies:
  - python=3.11
  - pip
  - cryptography>=41.0.0
  - requests>=2.31.0
  - psutil>=5.9.5
  - paramiko>=3.3.0
  - scapy>=2.5.0
  - whois>=0.9.27
  - qrcode>=7.4.2
  - pillow>=10.0.0
  - discord.py>=2.3.0
  - selenium>=4.15.0
  - pyyaml>=6.0
  - tabulate>=0.9.0
  - tqdm>=4.66.0
  - beautifulsoup4>=4.12.0
  - lxml>=4.9.0
  - dnspython>=2.4.0
  - netaddr>=0.9.0
  - colorama>=0.4.6
  - pip:
    - telethon>=1.34.0
    - slack-sdk>=3.23.0
    - webdriver-manager>=4.0.1
    - pyshorteners>=1.0.1
    - python-dotenv>=1.0.0
    - geoip2>=4.7.0
    - mac-vendor-lookup>=0.1.12

variables:
  PYTHONPATH: ${PYTHONPATH}:${CONDA_PREFIX}/lib/python3.11/site-packages